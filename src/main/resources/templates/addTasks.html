<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>新規タスク作成</title>
	<link rel="stylesheet" href="/css/style.css">
</head>

<body>

	<h1>新規タスク作成</h1>
	<div th:each="error:${errorList}">
		<span th:text="${error}" style="color: red"></span>
	</div>
	<form action="/tasks/add" method="post">
		<table border="1">
			<tr>
				<th>カテゴリー</th>

				<td><select name="categoryId">
						<option th:each="category:${categories}" th:value="${category.id}">[[${category.name}]]</option>

				</td> </select><br>



			</tr>
			<tr>
				<th>タイトル</th>
				<td>
					<input type="text" name="title" th:value="${title}" >
				</td>
			</tr>
			<tr>
				<th>期限</th>
				<td>
					<input type="date" name="closingdate"  >
				</td>
			</tr>
			<tr>
				<th>進歩状況</th>
				<td><select name="progress">
						<option value="0">未着手</option>
						<option value="1">進行中</option>
						<option value="2">完了</option>
				</td> </select><br>
			</tr>

			<tr>
				<th>メモ</th>
				<td>
					<textarea name="memo"></textarea>
				</td>
			</tr>
		</table>
		<button>登録</button>
	</form>
</body>

</html>
