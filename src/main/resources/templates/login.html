<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ログイン</title>
	<link rel="stylesheet" href="/css/style.css">

</head>

<body>
	<div class="login-container">
	<header>
		<h1>ログイン</h1>

	</header>
	<main>

		<form action="/login" method="post">
			<input type="text" name="email" th:value="${email}" placeholder="メールアドレス"><br>
			<input type="password" name="password" placeholder="パスワード"><br>
			<input type="password" name="checkpassword" placeholder="パスワード(確認)"><br>

			<button>ログイン</button>
			<br> <span th:text="${message}" style="color: red"></span>

		</form>
		<br>
		<a href="/users/new">新規会員登録</a>
	</main>
	</div>
</body>

</html>
