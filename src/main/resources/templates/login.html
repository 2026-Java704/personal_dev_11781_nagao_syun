<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ログイン</title>

</head>

<body>
	<header>
		<h1>ログイン</h1>

	</header>
	<main>
		<div th:each="error:${errorList}">
			<span th:text="${error}" style="color: red"></span>
		</div>
		<form action="/login" method="post">
			<input type="text" name="email" th:value="${email}" placeholder="メールアドレス"><br>
			<input type="text" name="password" placeholder="パスワード"><br>
			<button>ログイン</button>

		</form>
		<br>
		<a href="/users/new">ユーザー新規作成</a>
	</main>
</body>

</html>
